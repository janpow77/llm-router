# Lokale Dev-Compose (im Repo).
# Für CCX23-Deployment nutzt man compose.ccx23.yaml.
services:
  llm-router:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-router:dev
    container_name: llm-router-dev
    ports:
      - "7842:7842"
    volumes:
      - ./config.example.yaml:/etc/llm-router/config.yaml:ro
      - llm-router-data:/data
    environment:
      LLM_ROUTER_CONFIG: /etc/llm-router/config.yaml
    restart: unless-stopped

volumes:
  llm-router-data:
